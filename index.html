<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link rel="stylesheet" href="./style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h1>Student Dashboard</h1>

    <div class="add-box">

        <input id="name" placeholder="Student Name">
        <input id="html" type="number" placeholder="HTML">
        <input id="css" type="number" placeholder="CSS">
        <input id="js" type="number" placeholder="JavaScript">

        <button class="add-btn" onclick="addStudent()">
            Add Student
        </button>

    </div>

    <div class="cards">

        <div class="card">
            <h2>Total Students</h2>
            <p id="totalStudents">4</p>
        </div>

        <div class="card">
            <h2>Success Rate</h2>
            <p>85%</p>
        </div>

        <div class="card">
            <h2>Attendance</h2>
            <p>90%</p>
        </div>

    </div>

    <div class="charts">

        <div class="chart-box">
            <h2>Student Grades</h2>
            <canvas id="barChart"></canvas>
        </div>

        <div class="chart-box">
            <h2>Performance Levels</h2>
            <canvas id="pieChart"></canvas>
        </div>

    </div>

    <div class="table-box">

        <h2>Student Data</h2>

        <table id="table">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>HTML</th>
                <th>CSS</th>
                <th>JavaScript</th>
                <th>Actions</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Ahmed</td>
                <td>95</td>
                <td>90</td>
                <td>92</td>
                <td>
                    <button class="edit-btn" onclick="editStudent(this)">Edit</button>
                    <button class="delete-btn" onclick="deleteStudent(this)">Delete</button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Sara</td>
                <td>88</td>
                <td>85</td>
                <td>91</td>
                <td>
                    <button class="edit-btn" onclick="editStudent(this)">Edit</button>
                    <button class="delete-btn" onclick="deleteStudent(this)">Delete</button>
                </td>
            </tr>

            <tr>
                <td>3</td>
                <td>Omar</td>
                <td>91</td>
                <td>89</td>
                <td>95</td>
                <td>
                    <button class="edit-btn" onclick="editStudent(this)">Edit</button>
                    <button class="delete-btn" onclick="deleteStudent(this)">Delete</button>
                </td>
            </tr>

            <tr>
                <td>4</td>
                <td>Mona</td>
                <td>84</td>
                <td>80</td>
                <td>82</td>
                <td>
                    <button class="edit-btn" onclick="editStudent(this)">Edit</button>
                    <button class="delete-btn" onclick="deleteStudent(this)">Delete</button>
                </td>
            </tr>

        </table>

    </div>

    <script src="./script.js"></script>

</body>

</html>
