<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Student Dashboard</h1>

<div class="cards">

    <div class="card">
        <h2>Total Students</h2>
        <p>120</p>
    </div>

    <div class="card">
        <h2>Success Rate</h2>
        <p>85%</p>
    </div>

    <div class="card">
        <h2>Attendance</h2>
        <p>90%</p>
    </div>

</div>

<div class="main">

    <div class="left">

        <div class="charts">

            <div class="chart-box">
                <h2>Student Grades</h2>
                <canvas id="barChart"></canvas>
            </div>

            <div class="chart-box">
                <h2>Performance Levels</h2>
                <canvas id="pieChart"></canvas>
            </div>

        </div>

    </div>

    <div class="right">

        <div class="form-box">

            <h2>Add Student</h2>

            <input type="text" id="studentId" placeholder="Student ID">

            <input type="text" id="studentName" placeholder="Student Name">

            <input type="number" id="studentGrade" placeholder="Grade">

            <button onclick="addStudent()">Add Student</button>

        </div>

        <div class="table-box">

            <h2>Student Data</h2>

            <table id="studentTable">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Grade</th>
                </tr>

                <tr>
                    <td>202401</td>
                    <td>Ahmed</td>
                    <td>95</td>
                </tr>

                <tr>
                    <td>202402</td>
                    <td>Sara</td>
                    <td>88</td>
                </tr>

                <tr>
                    <td>202403</td>
                    <td>Omar</td>
                    <td>91</td>
                </tr>

            </table>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
